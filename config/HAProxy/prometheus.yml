global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node_exporter'
    static_configs:
      - targets:
          - 'core1.fis.epn.ec:9100'
          - 'core2.fis.epn.ec:9100'
          - 'client.fis.epn.ec:9100'
        labels:
          proyecto: 'fis-miniidm'

  - job_name: 'haproxy'
    static_configs:
      - targets: ['localhost:8404']
