<VirtualHost *:443>
    ServerName core2.fis.epn.ec
    DocumentRoot /var/www/fis-webapp
 
    SSLEngine on
    SSLCertificateFile      /etc/ssl/fis-hosts/core2/core2.cert.pem
    SSLCertificateKeyFile   /etc/ssl/fis-hosts/core2/core2.key.pem
    SSLCACertificateFile    /etc/ssl/fis-ca/certs/ca.cert.pem
    LogLevel auth_gssapi:trace8
    <Directory /var/www/fis-webapp>
        AuthType GSSAPI
        AuthName "FIS Kerberos Login"
        GssapiCredStore keytab:/etc/apache2/http-core2.keytab
        Require valid-user
    </Directory>
</VirtualHost>
